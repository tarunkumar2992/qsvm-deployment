name: Scheduled Model Retraining

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 2am UTC
  workflow_dispatch:
    inputs:
      data_path:
        description: "Path/URL to fresh dataset"
        required: false
        default: "data/Brain_Tumor.csv"

jobs:
  retrain:
    name: Retrain & Evaluate QSVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest dataset (if configured)
        run: |
          # Replace with your actual data source (S3, GCS, etc.)
          echo "Using dataset: ${{ github.event.inputs.data_path || 'data/Brain_Tumor.csv' }}"

      - name: Train model
        id: train
        run: |
          python scripts/train.py --data "${{ github.event.inputs.data_path || 'data/Brain_Tumor.csv' }}" \
            --output artifacts/
          echo "Training complete"

      - name: Upload new artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "⚠️ QSVM scheduled retraining FAILED! Run: ${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
